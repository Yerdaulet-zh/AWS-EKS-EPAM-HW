services:
  redis:
    image: "redis:alpine"
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - app-network

  webapp:
    # build:
    #   context: ./fastapi
    #   dockerfile: Dockerfile
    image: 895587011312.dkr.ecr.eu-central-1.amazonaws.com/epam-hw-repository:v1.0.3
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
