apiVersion: app/v1
kind: Deployment
metadata:
  name: webapp
  namespace: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      name: webapp
  template:
    metadata:
      labels:
        name: webapp
    spec:
      nodeSelector:
        role: frontend
      containers:
      - name: webapp
        image: 895587011312.dkr.ecr.eu-central-1.amazonaws.com/epam-hw-repository:v1.0.6
        ports:
        - containerPort: 80
        env:
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: webapp-config
              key: REDIS_HOST
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
