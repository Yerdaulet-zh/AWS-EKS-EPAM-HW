apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: prod-gateway
  namespace: nginx-gateway
  annotations: # Name of the ClusterIssuer
    cert-manager.io/cluster-issuer: letsencrypt-dns
spec:
  gatewayClassName: nginx
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: Selector
        selector:
          matchLabels:
            gateway-access: "enabled"
  - name: https
    protocol: HTTPS
    port: 443
    hostname: "todo.imon.work"
    tls:
      mode: Terminate
      certificateRefs:
      - name: imon-work-wildcard-tls
    allowedRoutes:
      namespaces:
        from: Selector
        selector:
          matchLabels:
            gateway-access: "enabled"
